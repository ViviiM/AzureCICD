name: Validate Salesforce PR

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      SF_SKIP_NEW_VERSION_CHECK: true
      SF_DISABLE_TELEMETRY: true

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: |
          wget -q https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.gz
          mkdir -p $HOME/sf-cli
          tar xzf sf-linux-x64.tar.gz -C $HOME/sf-cli --strip-components=1
          echo "$HOME/sf-cli/bin" >> $GITHUB_PATH
          $HOME/sf-cli/bin/sf --version

      - name: Install Git Delta Plugin
        run: |
          mkdir -p ~/.local/share/sf
          echo '["sfdx-git-delta"]' > ~/.local/share/sf/unsignedPluginAllowList.json
          sf plugins install sfdx-git-delta@6.12.0

      - name: Create JWT Key File
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate
        run: |
          sf org login jwt \
            --client-id ${{ secrets.SF_CONSUMER_KEY }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SF_USERNAME }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL }} \
            --alias ciOrg

      - name: Generate Delta Package
        run: |
          mkdir delta

          sf sgd source delta \
            --from origin/main \
            --to HEAD \
            --output-dir delta

      - name: Check Delta Exists
        run: |
          if [ ! -f delta/package/package.xml ]; then
            echo "No metadata changes found."
            exit 0
          fi

      - name: Validate Deployment
        run: |
          sf project deploy validate \
            --manifest delta/package/package.xml \
            --target-org ciOrg \
            --test-level RunLocalTests \
            --wait 60