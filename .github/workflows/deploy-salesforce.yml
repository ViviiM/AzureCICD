name: Deploy Salesforce ContactTrigger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: false # Disables this job for testing 
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # 2. Install Node.js 22 (required by SF CLI undici dependency)
      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"

      # 3. Install Salesforce CLI
      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --location=global
          sf --version

      # 4. Write JWT private key from GitHub Secret to a file
      - name: Write JWT private key
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}
        run: |
          echo "$SF_JWT_KEY" > server.key

      # 5. Authenticate via JWT
      - name: Authenticate to Salesforce
        env:
          SF_CONSUMER_KEY: ${{ secrets.SF_CONSUMER_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
        run: |
          sf org login jwt \
            --client-id "$SF_CONSUMER_KEY" \
            --jwt-key-file server.key \
            --username "$SF_USERNAME" \
            --instance-url "$SF_INSTANCE_URL" \
            --alias ciOrg \
            --set-default

      # 6. Deploy ContactTrigger to Salesforce org
      - name: Deploy ContactTrigger
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org ciOrg \
            --test-level RunSpecifiedTests \
            --tests ContactTriggerTest ContactHandlerTest \
            --wait 10

      # 7. Clean up the private key file
      - name: Remove private key file
        if: always()
        run: rm -f server.key
