name: Deploy Salesforce ContactTrigger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Node.js 18
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 3. Install Salesforce CLI
      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --location=global
          sf --version

      # 4. Write JWT private key from GitHub Secret to a file
      - name: Write JWT private key
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key

      # 5. Authenticate via JWT
      - name: Authenticate to Salesforce
        run: |
          sf org login jwt \
            --client-id ${{ secrets.SF_CONSUMER_KEY }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SF_USERNAME }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL }} \
            --alias ciOrg \
            --set-default

      # 6. Deploy ContactTrigger to Salesforce org
      - name: Deploy ContactTrigger
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org ciOrg \
            --test-level RunLocalTests \
            --wait 10

      # 7. Clean up the private key file
      - name: Remove private key file
        if: always()
        run: rm -f server.key
